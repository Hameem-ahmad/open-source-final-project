<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="brand">UMT Student Management</a>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <section class="page">
    <div class="container">
      <h1 style="margin-bottom:1.5rem;color:var(--primary);">Attendance Tracking</h1>
      <div id="alert-box"></div>

      <div class="card" id="mark-section">
        <h2>Mark Attendance</h2>
        <form id="attendance-form" class="form-row">
          <div class="form-group"><label>Student ID</label><input type="number" id="student_id" required></div>
          <div class="form-group"><label>Course ID</label><input type="number" id="course_id" required></div>
          <div class="form-group"><label>Date</label><input type="date" id="date" required></div>
          <div class="form-group">
            <label>Status</label>
            <select id="status" required>
              <option value="Present">Present</option>
              <option value="Absent">Absent</option>
              <option value="Late">Late</option>
            </select>
          </div>
          <div class="form-group" style="align-self:end;"><button type="submit" class="btn btn-primary">Mark</button></div>
        </form>
      </div>

      <div class="card">
        <h2>View Attendance Records</h2>
        <div class="form-row" style="margin-bottom:1rem;">
          <div class="form-group"><label>Student ID</label><input type="number" id="view-student-id"></div>
          <div class="form-group" style="align-self:end;"><button class="btn btn-secondary" id="view-btn">View Records</button></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Course</th><th>Status</th></tr></thead>
            <tbody id="attendance-table"><tr><td colspan="3">Enter a student ID to view records.</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>Attendance Summary</h2>
        <div id="summary-container">Enter a student ID above to see summary.</div>
      </div>
    </div>
  </section>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    const user = requireAuth(["admin", "teacher", "student"]);
    renderNavbar("attendance");

    document.getElementById("date").valueAsDate = new Date();

    if (user && user.role === "student") {
      document.getElementById("mark-section").classList.add("hidden");
    }

    async function loadAttendance(studentId) {
      try {
        const records = await apiRequest(`/api/attendance/${studentId}`);
        const tbody = document.getElementById("attendance-table");
        if (!records.length) {
          tbody.innerHTML = '<tr><td colspan="3">No attendance records.</td></tr>';
        } else {
          tbody.innerHTML = records.map((r) => `
            <tr>
              <td>${formatDate(r.date)}</td>
              <td>${r.course_title || r.course_id}</td>
              <td><span class="badge badge-${r.status.toLowerCase()}">${r.status}</span></td>
            </tr>
          `).join("");
        }

        const summary = await apiRequest(`/api/attendance/summary/${studentId}`);
        const container = document.getElementById("summary-container");
        if (!summary.length) {
          container.innerHTML = "<p>No summary available.</p>";
        } else {
          container.innerHTML = `
            <div class="table-wrap"><table>
              <thead><tr><th>Course</th><th>Present</th><th>Absent</th><th>Late</th><th>Total</th><th>%</th></tr></thead>
              <tbody>${summary.map((s) => `
                <tr>
                  <td>${s.course_title}</td><td>${s.present}</td><td>${s.absent}</td>
                  <td>${s.late}</td><td>${s.total}</td><td>${s.percentage}%</td>
                </tr>
              `).join("")}</tbody>
            </table></div>
          `;
        }
      } catch (err) {
        showAlert("alert-box", err.message);
      }
    }

    document.getElementById("attendance-form")?.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearAlert("alert-box");
      try {
        await apiRequest("/api/attendance", {
          method: "POST",
          body: JSON.stringify({
            student_id: parseInt(document.getElementById("student_id").value, 10),
            course_id: parseInt(document.getElementById("course_id").value, 10),
            date: document.getElementById("date").value,
            status: document.getElementById("status").value,
          }),
        });
        showAlert("alert-box", "Attendance marked.", "success");
      } catch (err) {
        showAlert("alert-box", err.message);
      }
    });

    document.getElementById("view-btn").addEventListener("click", async () => {
      let studentId = document.getElementById("view-student-id").value;
      if (user.role === "student") {
        const dashboard = await apiRequest("/api/dashboard/student");
        studentId = dashboard.profile.id;
        document.getElementById("view-student-id").value = studentId;
      }
      if (studentId) loadAttendance(parseInt(studentId, 10));
    });

    if (user && user.role === "student") {
      document.getElementById("view-btn").click();
    }
  </script>
</body>
</html>
